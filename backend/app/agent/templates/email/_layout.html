<!doctype html>
<html>
  <body style="margin:0;padding:0;background:#f4f5f7;font-family:Segoe UI,Arial,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0"
                 style="background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">
            <tr>
              <td style="background:#111827;padding:20px 28px;">
                <span style="color:#ffffff;font-size:18px;font-weight:600;">BA Agent</span>
                <span style="color:#9ca3af;font-size:13px;"> · SRS Generator</span>
              </td>
            </tr>
            <tr>
              <td style="padding:28px;">
                {% block content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:16px 28px;background:#f9fafb;color:#9ca3af;font-size:12px;">
                This is an automated message from the BA Agent internal tool.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
